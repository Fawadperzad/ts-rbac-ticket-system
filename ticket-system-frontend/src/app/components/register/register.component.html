<div class="register-wrapper">
  <div class="register-card">
    <h2>🎫 Ticket System</h2>
    <p class="subtitle">Create your account</p>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" [(ngModel)]="username" name="username" placeholder="your_username" required />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="Min. 6 characters" required />
      </div>

      @if (errorMessage) {
        <p class="error">{{ errorMessage }}</p>
      }
      @if (successMessage) {
        <p class="success">{{ successMessage }}</p>
      }

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Registering...' : 'Register' }}
      </button>
    </form>

    <p class="login-link">Already have an account? <a routerLink="/login">Sign in</a></p>
  </div>
</div>
